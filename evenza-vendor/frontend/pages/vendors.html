<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { background: var(--gray-50); padding-top: var(--nav-h); }

    .search-hero {
      background: var(--burg-dark);
      padding: 36px 0 28px;
    }

    .filter-sidebar {
      width: 240px;
      flex-shrink: 0;
    }

    .filter-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      padding: 18px;
      margin-bottom: 14px;
    }

    .filter-title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-500);
      margin-bottom: 12px;
    }

    .filter-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
    }

    .filter-check-item label {
      font-size: 13px;
      color: var(--dark);
      cursor: pointer;
      flex: 1;
    }

    .filter-count {
      font-size: 11px;
      color: var(--gray-400);
      background: var(--gray-100);
      padding: 1px 6px;
      border-radius: 10px;
    }

    .price-range {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .price-input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      color: var(--dark);
    }

    .price-input:focus { border-color: var(--burg-mid); }

    .sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-200);
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .vendor-grid-listing {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .vendor-list-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all var(--t-slow);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .vendor-list-card:hover {
      border-color: var(--burg-mid);
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }

    .vlc-img {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .vlc-badges {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .vlc-wishlist {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all var(--t-fast);
    }

    .vlc-wishlist:hover { background: var(--white); transform: scale(1.1); }
    .vlc-wishlist.active { color: var(--danger); }

    .vlc-body { padding: 14px 16px; }

    .vlc-cat {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3px;
    }

    .vlc-name {
      font-family: var(--font-display);
      font-size: 17px;
      color: var(--dark);
      margin-bottom: 3px;
    }

    .vlc-location {
      font-size: 11px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }

    .vlc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid var(--gray-100);
    }

    .vlc-price {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--burg);
    }

    .vlc-rating {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 32px 0 16px;
    }

    .page-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--gray-200);
      background: var(--white);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--t-fast);
      display: flex; align-items: center; justify-content: center;
    }

    .page-btn:hover { border-color: var(--burg); color: var(--burg); }
    .page-btn.active { background: var(--burg); color: var(--cream); border-color: var(--burg); }

    .active-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--burg-light);
      border: 1px solid var(--burg-mid);
      font-size: 11px;
      color: var(--burg);
    }

    .active-chip button {
      background: none;
      border: none;
      color: var(--burg);
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    @media (max-width: 1000px) { .vendor-grid-listing { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 700px)  { .filter-sidebar { display: none; } .vendor-grid-listing { grid-template-columns: 1fr; } }
  </style>
</head>

<script>
const VENDORS = [
  {id:1,name:'Kapoor Photography',cat:'Photographer',city:'Mumbai',rating:4.9,reviews:156,price:45000,verified:true,featured:true,premium:true,avail:'AVAILABLE',bg:'#F7EDEF',icon:'📷'},

  {id:4,name:'Glamour Makeup Studio',cat:'Makeup Artist',city:'Chennai',rating:4.9,reviews:340,price:15000,verified:true,featured:true,premium:true,avail:'AVAILABLE',bg:'#FBEAF0',icon:'💄'},
  {id:5,name:'Mehendi Magic',cat:'Mehendi Artist',city:'Jaipur',rating:4.8,reviews:189,price:8000,verified:false,featured:false,premium:false,avail:'AVAILABLE',bg:'#F7EDEF',icon:'🖐'},
  {id:6,name:'BeatDrop Entertainment',cat:'DJ',city:'Mumbai',rating:4.6,reviews:87,price:25000,verified:true,featured:false,premium:false,avail:'BUSY',bg:'#EEE9FF',icon:'🎵'},
  {id:7,name:'Dream Wedding Planners',cat:'Wedding Planner',city:'Hyderabad',rating:4.9,reviews:124,price:150000,verified:true,featured:true,premium:true,avail:'AVAILABLE',bg:'#E6F1FB',icon:'📋'},
  {id:8,name:'Grand Pavilion Venue',cat:'Venue',city:'Mumbai',rating:4.7,reviews:56,price:200000,verified:true,featured:false,premium:false,avail:'AVAILABLE',bg:'#F0E8F8',icon:'🏛'},
  {id:9,name:'Swarovski Jewelry',cat:'Jewelry',city:'Surat',rating:4.8,reviews:78,price:5000,verified:true,featured:false,premium:false,avail:'AVAILABLE',bg:'#FBF3E2',icon:'💍'},
  {id:10,name:'Click & Canvas',cat:'Photographer',city:'Pune',rating:4.6,reviews:92,price:30000,verified:false,featured:false,premium:false,avail:'AVAILABLE',bg:'#F7EDEF',icon:'📷'},
  {id:11,name:'Royal Caterers',cat:'Caterer',city:'Delhi',rating:4.5,reviews:145,price:600,verified:true,featured:false,premium:false,avail:'AVAILABLE',bg:'#E6F5EE',icon:'🍽'},
  {id:12,name:'Prism Studios',cat:'Photographer',city:'Bangalore',rating:4.9,reviews:201,price:60000,verified:true,featured:true,premium:true,avail:'AVAILABLE',bg:'#F0E8F8',icon:'📷'},
];

let currentView = 'grid';
let currentPage = 1;
const PER_PAGE = 9;
const wishlist = new Set();

const debounceSearch = debounce(doSearch, 400);

function getFilters() {
  return {
    q: (document.getElementById('searchQ').value || '').toLowerCase(),
    city: document.getElementById('searchCity').value,
    cat: document.querySelector('input[name="cat"]:checked')?.value || '',
    minPrice: parseInt(document.getElementById('minPrice').value) || 0,
    maxPrice: parseInt(document.getElementById('maxPrice').value) || Infinity,
    rating: parseFloat(document.querySelector('input[name="rating"]:checked')?.value) || 0,
    verified: document.getElementById('verifiedOnly').checked,
    featured: document.getElementById('featuredOnly').checked,
    premium:  document.getElementById('premiumOnly').checked,
    sortBy:   document.getElementById('sortBy').value,
  };
}

function filterVendors() {
  const f = getFilters();
  let data = VENDORS.filter(v => {
    if (f.q && !v.name.toLowerCase().includes(f.q) && !v.cat.toLowerCase().includes(f.q)) return false;
    if (f.city && v.city !== f.city) return false;
    if (f.cat && v.cat !== f.cat) return false;
    if (v.price < f.minPrice) return false;
    if (v.price > f.maxPrice) return false;
    if (v.rating < f.rating) return false;
    if (f.verified && !v.verified) return false;
    if (f.featured && !v.featured) return false;
    if (f.premium  && !v.premium)  return false;
    return true;
  });

  if (f.sortBy === 'price_asc')   data.sort((a,b) => a.price - b.price);
  if (f.sortBy === 'price_desc')  data.sort((a,b) => b.price - a.price);
  if (f.sortBy === 'rating')      data.sort((a,b) => b.rating - a.rating);
  if (f.sortBy === 'reviews')     data.sort((a,b) => b.reviews - a.reviews);

  return data;
}

function doSearch() { currentPage = 1; render(); }
function applyFilters() { currentPage = 1; render(); }

function render() {
  const data = filterVendors();
  const start = (currentPage - 1) * PER_PAGE;
  const page  = data.slice(start, start + PER_PAGE);
  const total = data.length;

  document.getElementById('resultCount').textContent = `${total.toLocaleString('en-IN')} vendor${total !== 1 ? 's' : ''} found`;

  const grid = document.getElementById('vendorResults');
  if (currentView === 'list') {
    grid.style.gridTemplateColumns = '1fr';
  } else {
    grid.style.gridTemplateColumns = 'repeat(3,1fr)';
  }

  if (!page.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px 0;">
      <div style="font-size:40px;margin-bottom:12px;">🔍</div>
      <div style="font-family:var(--font-display);font-style:italic;color:var(--gray-400);font-size:1.2rem;">No vendors found</div>
      <div style="font-size:13px;color:var(--gray-300);margin-top:6px;">Try adjusting your filters</div>
      <button onclick="clearFilters()" class="btn btn-outline-dark btn-sm" style="margin-top:16px;">Clear Filters</button>
    </div>`;
  } else {
    grid.innerHTML = page.map(v => renderCard(v)).join('');
  }

  renderPagination(total);
  updateActiveFilters();
}

function renderCard(v) {
  const inWishlist = wishlist.has(v.id);
  if (currentView === 'list') {
    return `
      <a href="vendor-profile.html?id=${v.id}" class="vendor-list-card" style="display:flex;align-items:center;gap:0;">
        <div style="width:120px;min-width:120px;height:100px;background:${v.bg};display:flex;align-items:center;justify-content:center;font-size:32px;">${v.icon}</div>
        <div style="flex:1;padding:14px 16px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
            <div>
              <div class="vlc-cat">${v.cat}</div>
              <div class="vlc-name" style="font-size:15px;">${v.name}</div>
              <div class="vlc-location">${v.city}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div class="vlc-price">₹${v.price.toLocaleString('en-IN')}+</div>
              <div style="font-size:11px;color:var(--gold);">★ ${v.rating} (${v.reviews})</div>
              <button onclick="event.preventDefault();toggleWishlist(${v.id},this)" class="vlc-wishlist ${inWishlist?'active':''}" style="position:static;margin-top:6px;width:auto;padding:4px 8px;border-radius:6px;border:1px solid var(--gray-200);font-size:11px;">${inWishlist?'♥ Saved':'♡ Save'}</button>
            </div>
          </div>
        </div>
        <div style="padding:14px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;">
          ${v.verified?'<span class="badge badge-verified">✓ Verified</span>':''}
          ${v.featured?'<span class="badge badge-gold">★ Featured</span>':''}
        </div>
      </a>`;
  }
  return `
    <a href="vendor-profile.html?id=${v.id}" class="vendor-list-card">
      <div class="vlc-img" style="background:${v.bg};">
        <span style="font-size:44px;">${v.icon}</span>
        <div class="vlc-badges">
          ${v.verified?'<span class="badge badge-verified" style="font-size:9px;">✓ Verified</span>':''}
          ${v.featured?'<span class="badge badge-gold" style="font-size:9px;">★ Featured</span>':''}
        </div>
        <button onclick="event.preventDefault();toggleWishlist(${v.id},this)" class="vlc-wishlist ${inWishlist?'active':''}">
          ${inWishlist?'♥':'♡'}
        </button>
      </div>
      <div class="vlc-body">
        <div class="vlc-cat">${v.cat}</div>
        <div class="vlc-name">${v.name}</div>
        <div class="vlc-location">
          <svg width="11" height="11" fill="none" viewBox="0 0 11 11"><path d="M5.5 1C3.8 1 2.5 2.3 2.5 4c0 2.5 3 6 3 6s3-3.5 3-6c0-1.7-1.3-3-3-3zm0 4a1 1 0 110-2 1 1 0 010 2z" fill="currentColor"/></svg>
          ${v.city}
        </div>
        <div class="vlc-row">
          <div class="vlc-price">₹${v.price.toLocaleString('en-IN')}+</div>
          <div class="vlc-rating">
            <span style="color:var(--gold);font-size:12px;">★ ${v.rating}</span>
            <span style="font-size:11px;color:var(--gray-400);">(${v.reviews})</span>
          </div>
        </div>
      </div>
    </a>`;
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  const wrap = document.getElementById('pagination');
  if (pages <= 1) { wrap.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || (i >= currentPage-1 && i <= currentPage+1)) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (i === currentPage-2 || i === currentPage+2) {
      html += `<span style="color:var(--gray-400);align-self:center;">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  wrap.innerHTML = html;
}

function goPage(n) {
  const data = filterVendors();
  const pages = Math.ceil(data.length / PER_PAGE);
  if (n < 1 || n > pages) return;
  currentPage = n;
  render();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function updateActiveFilters() {
  const f = getFilters();
  const chips = [];
  if (f.q)       chips.push(`"${f.q}"`);
  if (f.city)    chips.push(f.city);
  if (f.cat)     chips.push(f.cat);
  if (f.minPrice > 0) chips.push(`Min ₹${f.minPrice.toLocaleString()}`);
  if (f.maxPrice < Infinity) chips.push(`Max ₹${f.maxPrice.toLocaleString()}`);
  if (f.verified) chips.push('Verified only');
  if (f.featured) chips.push('Featured');

  document.getElementById('activeFilters').innerHTML = chips.map(c => `
    <div class="active-chip">${c}</div>`).join('');
}

function setPrice(min, max, el) {
  document.getElementById('minPrice').value = min || '';
  document.getElementById('maxPrice').value = max === 999999 ? '' : max;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  applyFilters();
}

function clearFilters() {
  document.getElementById('searchQ').value = '';
  document.getElementById('searchCity').value = '';
  document.getElementById('minPrice').value = '';
  document.getElementById('maxPrice').value = '';
  document.getElementById('cat-all').checked = true;
  document.getElementById('rat-all').checked = true;
  document.getElementById('av-all').checked = true;
  document.getElementById('verifiedOnly').checked = false;
  document.getElementById('featuredOnly').checked = false;
  document.getElementById('premiumOnly').checked = false;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  applyFilters();
}

function toggleWishlist(id, btn) {
  if (wishlist.has(id)) {
    wishlist.delete(id);
    btn.innerHTML = '♡';
    btn.classList.remove('active');
    showToast('Removed from saved', 'info');
  } else {
    wishlist.add(id);
    btn.innerHTML = '♥';
    btn.classList.add('active');
    showToast('Saved to wishlist! ♥', 'success');
  }
}

function setView(type, btn) {
  currentView = type;
  document.querySelectorAll('#gridViewBtn,#listViewBtn').forEach(b => {
    b.style.background = 'var(--white)';
    b.style.borderColor = 'var(--gray-200)';
    b.querySelector('svg').style.stroke = 'var(--gray-400)';
  });
  btn.style.background = 'var(--burg)';
  btn.style.borderColor = 'var(--burg)';
  render();
}

// Read URL params
const params = new URLSearchParams(location.search);
if (params.get('q'))    document.getElementById('searchQ').value = params.get('q');
if (params.get('city')) document.getElementById('searchCity').value = params.get('city');
if (params.get('cat')) {
  document.querySelectorAll('input[name="cat"]').forEach(r => {
    if (r.value.toLowerCase() === params.get('cat').toLowerCase()) r.checked = true;
  });
}

render();
</script>
</body>
</html>
